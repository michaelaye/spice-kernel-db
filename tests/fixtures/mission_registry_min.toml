# - MSL: one candidate, planetarypy = false (default)

[LRO]
candidates = [
  "{server}{m}/data/spice/mk/",
  "{server}{m}/kernels/mk/",
]
planetarypy = true

[MSL]
candidates = [
  "{server}{m}/kernels/mk/former_versions/",
]
