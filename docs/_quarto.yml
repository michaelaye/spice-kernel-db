  repo-url: https://github.com/michaelaye/spice-kernel-db
  repo-actions: [edit, issue]
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: motivation.qmd
        text: Motivation
      - href: design.qmd
        text: Design
      - href: usage.qmd
        text: Usage Guide
      - href: coverage.qmd
        text: Coverage
      - href: cli.qmd
        text: CLI Reference
      - href: tutorial-mission-discovery.ipynb
        text: "Tutorial: NASA missions"
      - href: api.qmd
        text: API Reference
      - href: troubleshooting.qmd
        text: Troubleshooting
    right:
      - icon: github
